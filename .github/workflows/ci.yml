###############################################################################
# CI — Continuous Integration
# Runs on every push and pull request to catch errors early.
###############################################################################

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel previous runs on the same branch/PR to save resources
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint & Type-Check ──
  lint:
    name: Lint & Type-Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      - name: Type-check TypeScript
        run: npx tsc --noEmit
        continue-on-error: true

  # ── Build Next.js ──
  build:
    name: Build Next.js
    runs-on: ubuntu-latest
    needs: []

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build

  # ── Build Docker Images (validate Dockerfiles) ──
  docker:
    name: Validate Docker Build
    runs-on: ubuntu-latest
    needs: []

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Next.js Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: omnirad-web:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build AI Service Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./ai_service
          file: ./ai_service/Dockerfile
          push: false
          tags: omnirad-ai:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
